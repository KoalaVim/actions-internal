name: Rebase Plugin Fork
on:
  workflow_call:
    inputs:
      upstream_repo:
        required: true
        type: string
      plugin_name:
        required: true
        type: string
      tracking_issue_number:
        required: true
        type: string
    secrets:
      KOALA_APP_ID:
        required: true
      KOALA_APP_PRIVATE_KEY:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KOALA_APP_ID }}
          private-key: ${{ secrets.KOALA_APP_PRIVATE_KEY }}
          # This ensures the token works across the whole Org
          owner: ${{ github.repository_owner }}

      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - name: Setup Bot Identity & Upstream
        id: setup
        run: |
          git config --global user.name "koalavim-bot[bot]"
          git config --global user.email "koalavimbot[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/${{ inputs.upstream_repo }}.git
          git fetch upstream

          # Detect upstream default branch (main vs master)
          UPSTREAM_DEFAULT=$(git remote show upstream | sed -n '/HEAD branch/s/.*: //p')
          echo "upstream_branch=$UPSTREAM_DEFAULT" >> $GITHUB_OUTPUT

          # Detect local default branch
          LOCAL_DEFAULT=$(git symbolic-ref --short HEAD)
          echo "local_branch=$LOCAL_DEFAULT" >> $GITHUB_OUTPUT

      - name: Attempt Rebase
        id: rebase
        run: |
          UPSTREAM_BR=${{ steps.setup.outputs.upstream_branch }}
          LOCAL_BR=${{ steps.setup.outputs.local_branch }}

          if git rebase upstream/$UPSTREAM_BR; then
            git push origin $LOCAL_BR --force
            echo "status=success" >> $GITHUB_OUTPUT
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Handle Failure
        if: steps.rebase.outputs.status == 'failed'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          # 1. Create issue ONLY in the local fork
          # ${{ github.repository }} evaluates to "KoalaVim/guess-indent.nvim"
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Rebase Conflict: ${{ inputs.plugin_name }}" \
            --body "The automatic rebase with ${{ inputs.upstream_repo }} failed. Please resolve conflicts manually in this fork."

          # 2. Comment on the Dashboard in the main KoalaVim repo
          gh issue comment ${{ inputs.tracking_issue_number }} \
            --repo ${{ github.repository_owner }}/KoalaVim \
            --body "🚨 **Conflict:** [${{ inputs.plugin_name }}](${{ github.server_url }}/${{ github.repository }}) needs manual attention."

      - name: Update KoalaVim Lockfile
        if: steps.rebase.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          NEW_SHA=${{ steps.rebase.outputs.sha }}
          git clone https://x-access-token:$GH_TOKEN@github.com/${{ github.repository_owner }}/KoalaVim.git main_repo
          cd main_repo

          BRANCH_NAME="update-${{ inputs.plugin_name }}-${NEW_SHA:0:7}"
          git checkout -b $BRANCH_NAME

          sed -i "s/\(\"${{ inputs.plugin_name }}\".*\"commit\": \"\)[^\"]*/\1$NEW_SHA/" lazy-lock.json

          git add lazy-lock.json
          git commit -m "chore(deps): update ${{ inputs.plugin_name }}"
          git push origin $BRANCH_NAME

          gh pr create --title "chore(deps): update ${{ inputs.plugin_name }}" --body "Automated sync." --base master --head $BRANCH_NAME
